    <rect x="0.75" y="0.75" width="78.5" height="78.5" rx="17.25" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
