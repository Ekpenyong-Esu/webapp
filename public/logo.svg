<svg xmlns="http://www.w3.org/2000/svg" width="326" height="80" viewBox="0 0 326 80" fill="none" role="img" aria-label="zaramTech AB">
  <title>zaramTech AB</title>
  <!-- Monogram badge: rounded square in brand navy -->
  <rect x="8" y="8" width="64" height="64" rx="16" fill="#1F3A5F"/>
  <!-- Subtle inner edge for depth -->
  <rect x="8.75" y="8.75" width="62.5" height="62.5" rx="15.25" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <!-- Stylized "Z" formed by circuit traces -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M27 28 H53"/>
    <path d="M53 28 L27 52"/>
    <path d="M27 52 H53"/>
  </g>
  <!-- Circuit nodes: silicon -> cloud accent -->
  <circle cx="27" cy="28" r="4.5" fill="#00C2CB"/>
  <circle cx="53" cy="52" r="4.5" fill="#00C2CB"/>
  <circle cx="40" cy="40" r="3" fill="#1F3A5F" stroke="#00C2CB" stroke-width="2.5"/>

  <!-- Wordmark -->
  <text x="88" y="51" font-family="'Space Grotesk', 'Segoe UI', Inter, Arial, sans-serif" font-size="34" letter-spacing="-0.5">
    <tspan fill="#1F3A5F" font-weight="700">Zaram</tspan><tspan fill="#1F3A5F" font-weight="700">Tech</tspan><tspan fill="#00C2CB" font-weight="700"> AB</tspan>
  </text>
</svg>
